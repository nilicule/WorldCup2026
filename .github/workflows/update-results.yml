name: Update results

# Pull finished World Cup 2026 matches from the FIFA API every hour and commit
# any newly-filled scores back to worldcup2026-results.json.
on:
  schedule:
    # Every hour, on the hour (UTC). GitHub may delay scheduled runs under load.
    - cron: "0 * * * *"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Needed so the workflow can push the updated JSON back to the repo.
permissions:
  contents: write

# Don't let overlapping runs race on the same file.
concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run update-results.sh
        run: ./update-results.sh

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- worldcup2026-results.json; then
            echo "No changes to worldcup2026-results.json."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add worldcup2026-results.json
          git commit -m "Update match results from FIFA API"
          git push
